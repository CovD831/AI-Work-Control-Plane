name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev,ui]"
      - name: Python CI gate
        run: make ci

  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui_frontend/package-lock.json
      - name: Install UI dependencies
        working-directory: ui_frontend
        run: npm ci
      - name: Build UI
        run: make ui-build
